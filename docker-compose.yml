services:

  # ─── Mail Server ────────────────────────────────────────────
  mailserver:
    build: .
    image: cloudmail:latest
    container_name: cloudmail
    restart: unless-stopped
    ports:
      - "25:25"       # SMTP MTA (receive from internet)
      - "465:465"     # SMTPS (SSL)
      - "587:587"     # SMTP Submission
      - "143:143"     # IMAP
      - "993:993"     # IMAPS
      - "110:110"     # POP3
      - "995:995"     # POP3S
      - "3000:3000"   # HTTP API / Admin / Webmail
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
    volumes:
      - mail_data:/var/cloudmail
      - mail_logs:/var/log/cloudmail
      - dkim_keys:/etc/cloudmail/dkim
      - ssl_certs:/etc/ssl/cloudmail
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mailnet
    cap_add:
      - NET_BIND_SERVICE  # Allow binding to ports < 1024
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cloudmail-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ssl_certs:/etc/ssl/cloudmail:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - mailserver
    networks:
      - mailnet

  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cloudmail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cloudmail}
      POSTGRES_USER: ${DB_USER:-cloudmail}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-cloudmail}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Uncomment to expose locally (dev only):
    # ports:
    #   - "5432:5432"

  # ─── Redis ──────────────────────────────────────────────────
  # No password on the internal Docker network — Redis is not exposed externally.
  # To enable auth, set REDIS_PASSWORD in .env and uncomment --requirepass below.
  redis:
    image: redis:7-alpine
    container_name: cloudmail-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - mailnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Uncomment to expose locally (dev only):
    # ports:
    #   - "6379:6379"

networks:
  mailnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:
  mail_data:
  mail_logs:
  dkim_keys:
  ssl_certs:
  nginx_logs:
